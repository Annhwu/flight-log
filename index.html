<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCS Flight Log</title>
  <meta name="description" content="Journal de vol DCS — enregistrez et consultez vos sessions de vol.">
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <div id="titlebar" data-tauri-drag-region>
    <div id="titlebar-title" data-tauri-drag-region><img id="titlebar-icon" src="./src/icon.png" alt=""> Flight Log
    </div>
    <div id="titlebar-controls">
      <button id="tb-minimize" onclick="tbMinimize()">—</button>
      <button id="tb-maximize" onclick="tbMaximize()">□</button>
      <button id="tb-close" onclick="tbClose()">✕</button>
    </div>
  </div>
  <div class="page">
    <div id="dcs-root">
      <div id="navbar">
        <div id="navbar-row1">
          <div id="header-title">Journal de Vol</div>
          <div id="navbar-row1-right">
            <div id="total-box">
              <span id="total-label">Total :</span><span id="total-hours">00h 00m</span>
            </div>
            <button id="profile-btn" class="profile-btn" onclick="showProfile()">?</button>
          </div>
        </div>
        <div id="navbar-row2">
          <div id="navbar-left">
            <button class="nav-tab active" id="nav-historique" onclick="showHistorique()">Historique</button>
            <button class="nav-tab" id="nav-new-flight" onclick="showNewFlight()">Nouveau vol</button>
          </div>
          <div id="navbar-right">
            <div id="session-zone">
              <div id="session-info">
                <div id="si-label">En attente</div>
                <div id="si-time">--:--:--</div>
                <div id="si-elapsed"></div>
              </div>
              <button id="btn-toggle" class="btn" onclick="toggleSession()">▶ ON</button>
            </div>
            <div id="search-bar">
              <input type="text" id="search-input" placeholder=" " oninput="filterSessions()">
              <span id="search-hint">Rechercher par nom, #numéro ou description…</span>
            </div>
          </div>
          <button id="burger-btn" onclick="toggleBurger()" aria-label="Menu">&#9776;</button>
        </div>
        <div id="burger-menu">
          <button class="nav-tab" id="burger-historique" onclick="showHistorique();closeBurger()">Historique</button>
          <button class="nav-tab" onclick="showNewFlight();closeBurger()">+ Nouveau vol</button>
          <hr class="burger-sep">
          <div id="burger-session-zone">
            <div id="burger-si-label">En attente</div>
            <div id="burger-si-time">--:--:--</div>
            <div id="burger-si-elapsed"></div>
            <button class="btn" id="burger-btn-toggle" onclick="toggleSession()">▶ ON</button>
          </div>
          <hr class="burger-sep">
          <input type="text" id="burger-search" class="burger-search-input" placeholder="Rechercher…" oninput="syncBurgerSearch()">
        </div>
      </div>
      <div id="new-flight-page" style="display:none">
        <div id="nf-header">
          <div id="nf-title">Nouveau vol</div>
        </div>
        <div id="nf-form">
          <div class="nf-times-col">
            <div class="nf-group">
              <label class="edit-block-label">Début</label>
              <div class="nf-datetime-row">
                <div class="ef-group"><label>Jour</label><input type="date" id="nf-date1" oninput="updateNewFlightResult()"></div>
                <div class="ef-group"><label>h</label><input type="number" id="nf-h1" min="0" max="23" value="0" oninput="updateNewFlightResult()"></div>
                <div class="ef-group"><label>min</label><input type="number" id="nf-m1" min="0" max="59" value="0" oninput="updateNewFlightResult()"></div>
              </div>
            </div>
            <div class="nf-group">
              <label class="edit-block-label">Fin</label>
              <div class="nf-datetime-row">
                <div class="ef-group"><label>Jour</label><input type="date" id="nf-date2" oninput="updateNewFlightResult()"></div>
                <div class="ef-group"><label>h</label><input type="number" id="nf-h2" min="0" max="23" value="0" oninput="updateNewFlightResult()"></div>
                <div class="ef-group"><label>min</label><input type="number" id="nf-m2" min="0" max="59" value="0" oninput="updateNewFlightResult()"></div>
              </div>
            </div>
          </div>
          <div class="nf-duration-row"><span class="res-label">Durée calculée</span><span class="res-dur" id="nf-duration">—</span></div>
          <div class="notes-group">
            <label class="edit-block-label">Nom du vol</label>
            <input type="text" id="nf-name" class="debrief-input" style="width:100%" placeholder="ex : Patrouille sur le Caucase">
          </div>
          <div class="notes-group">
            <label class="edit-block-label">Type(s) de mission</label>
            <div class="mission-picker-wrap" id="nf-mission-picker-wrap"></div>
          </div>
          <div class="notes-group">
            <label class="edit-block-label">Appareil(s) volé(s)</label>
            <div id="nf-aircraft-picker" class="aircraft-picker-scroll"></div>
          </div>
          <div class="notes-group">
            <label class="edit-block-label">Commentaire</label>
            <textarea id="nf-notes" class="notes-textarea" placeholder="Comment s'est passé le vol ?"></textarea>
          </div>
          <div class="edit-actions">
            <button class="btn-sm" onclick="saveNewFlight()">Ajouter</button>
            <button class="btn-sm" onclick="showHistorique()">Annuler</button>
          </div>
          <div id="nf-save-msg">✓ Sauvegardé</div>
        </div>
      </div>
      <div id="profile-page" style="display:none">
        <div id="pf-header">
          <div id="pf-title">Profil</div>
        </div>
        <div id="pf-content"></div>
      </div>
      <div id="main">
        <div id="io-bar">
          <button class="btn-sm" onclick="exportJSON()">Exporter JSON</button>
          <button class="btn-sm" onclick="importJSON()">Importer JSON</button>
          <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(event)">
        </div>
        <hr>
        <div id="log-header">
          <div id="log-title">Historique</div>
          <div id="session-count"></div>
        </div>
        <div id="sessions-list">
          <div id="empty-msg">Aucune session enregistrée <span id="blink">_</span></div>
        </div>
        <div id="steam-note">
          <span>■ Steam (importé) : <b id="steam-display">00h 00m</b></span>
          <button class="btn-sm" onclick="toggleSteamEdit()">Modifier</button>
        </div>
        <div id="steam-input-row">
          <label>h :</label><input type="number" id="steam-h-inp" min="0" value="0">
          <label>min :</label><input type="number" id="steam-m-inp" min="0" max="59" value="0">
          <button class="btn-sm" onclick="saveSteam()">Ok</button>
          <button class="btn-sm"
            onclick="document.getElementById('steam-input-row').style.display='none'">Annuler</button>
        </div>
      </div>
    </div>
  </div>
  <div id="debrief-overlay">
    <div id="debrief-modal">
      <div class="debrief-header">
        <div class="debrief-vol-num" id="debrief-num">Vol #01</div>
        <div class="debrief-dur" id="debrief-dur">00h 00m</div>
      </div>
      <div class="debrief-field">
        <label class="debrief-label">Nom du vol</label>
        <input type="text" id="debrief-name" class="debrief-input" placeholder="ex : Patrouille sur le Caucase">
      </div>
      <div class="debrief-field">
        <label class="debrief-label">Appareil(s) volé(s)</label>
        <div id="debrief-aircraft-picker" class="aircraft-picker-scroll"></div>
      </div>
      <div class="debrief-field">
        <label class="debrief-label">Type(s) de mission</label>
        <div class="mission-picker-wrap" id="debrief-mission-picker-wrap"></div>
      </div>
      <div class="debrief-field">
        <label class="debrief-label">Commentaire</label>
        <textarea id="debrief-notes" class="debrief-textarea" placeholder="Comment s'est passé le vol ?"></textarea>
      </div>
      <div class="debrief-actions">
        <button class="btn" onclick="confirmDebrief()">Confirmer</button>
        <button class="btn" onclick="skipDebrief()">Passer</button>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
