<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCS Flight Log</title>
  <meta name="description" content="Journal de vol DCS — enregistrez et consultez vos sessions de vol.">
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <div id="titlebar" data-tauri-drag-region>
    <div id="titlebar-title" data-tauri-drag-region><img id="titlebar-icon" src="./src/icon.png" alt=""> Flight Log
    </div>
    <div id="titlebar-controls">
      <button id="tb-minimize" onclick="tbMinimize()">—</button>
      <button id="tb-maximize" onclick="tbMaximize()">□</button>
      <button id="tb-close" onclick="tbClose()">✕</button>
    </div>
  </div>
  <div class="page">
    <div id="dcs-root">
      <div id="header">
        <div id="header-left">
          <div id="header-title">Journal de Vol</div>
        </div>
        <div id="total-box">
          <span id="total-label">Total :</span><span id="total-hours">00h 00m</span>
        </div>
      </div>
      <div id="main">
        <div id="session-zone">
          <div id="session-info">
            <div id="si-label">En attente</div>
            <div id="si-time">--:--:--</div>
            <div id="si-elapsed"></div>
          </div>
          <button id="btn-toggle" class="btn" onclick="toggleSession()">▶ ON</button>
        </div>
        <div id="io-bar">
          <button class="btn-sm" onclick="exportJSON()">Exporter JSON</button>
          <button class="btn-sm" onclick="importJSON()">Importer JSON</button>
          <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(event)">
        </div>
        <hr>
        <div id="log-header">
          <div id="log-title">Historique</div>
          <div id="session-count"></div>
        </div>
        <div id="sessions-list">
          <div id="empty-msg">Aucune session enregistrée <span id="blink">_</span></div>
        </div>
        <div id="steam-note">
          <span>■ Steam (importé) : <b id="steam-display">00h 00m</b></span>
          <button class="btn-sm" onclick="toggleSteamEdit()">Modifier</button>
        </div>
        <div id="steam-input-row">
          <label>h :</label><input type="number" id="steam-h-inp" min="0" value="0">
          <label>min :</label><input type="number" id="steam-m-inp" min="0" max="59" value="0">
          <button class="btn-sm" onclick="saveSteam()">Ok</button>
          <button class="btn-sm"
            onclick="document.getElementById('steam-input-row').style.display='none'">Annuler</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
